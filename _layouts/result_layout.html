---
layout: default
noindex: true
---
<div class="result-container">
  <div class="result-header">
    <h2>{{ page.test_title | default: "심리테스트" }} 결과</h2>
    <h1 class="result-type">{{ page.result_name }}</h1>
  </div>
  
  <div class="result-image">
    <img src="{{ page.result_image | relative_url }}" alt="{{ page.result_name }}" onerror="this.style.display='none';">
    {% if page.result_emoji %}
      <div style="font-size: 6rem; margin: 20px 0;">{{ page.result_emoji }}</div>
    {% endif %}
  </div>
  
  <div class="result-description content-area">
    {{ content }}
  </div>

  <div class="result-actions">
    <button class="btn btn-primary" onclick="shareResult()">결과 공유하기</button>
    <a href="{{ '/' | relative_url }}" class="btn btn-secondary">다른 테스트 하기</a>
  </div>
</div>

<script>
function shareResult() {
  if (navigator.share) {
    navigator.share({
      title: document.title,
      url: window.location.href
    }).catch(console.error);
  } else {
    navigator.clipboard.writeText(window.location.href)
      .then(() => alert("결과 링크가 복사되었습니다!"))
      .catch(() => alert("링크 복사에 실패했습니다."));
  }
}
</script>
